version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: truthbite-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage

  backend:
    build: .
    container_name: truthbite-backend
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: truthbite-phi4
      OLLAMA_TIMEOUT: "180"
    ports:
      - "8000:8000"
